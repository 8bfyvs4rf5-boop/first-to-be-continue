<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>17분임 오늘의 자리배치</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#f4f6f8;
    font-family:"Malgun Gothic",sans-serif;
    text-align:center;
}

.container{
    padding:20px;
}

h1{
    margin-bottom:10px;
}

.date{
    color:#666;
    margin-bottom:20px;
}

svg{
    width:100%;
    max-width:1100px;
    height:auto;
    margin-top:30px;
}

.seat{
    fill:#ececec;
    stroke:#888;
    stroke-width:2;
}

.label{
    font-size:14px;
    font-weight:bold;
}

.dday{
    font-size:11px;
    fill:#888;
}

.table{
    fill:white;
    stroke:#333;
    stroke-width:5;
}

.entrance{
    font-size:28px;
    font-weight:bold;
    fill:#444;
}

</style>

</head>
<body>

<div class="container">

<h1>17분임 오늘의 자리배치</h1>

<div class="date" id="today"></div>

<svg
id="seatMap"
viewBox="0 0 1100 1040"> </svg>

</div>

<script>

const BIRTHDAYS = {
    "황민중":[3,4],
    "위성군":[7,17],
    "이현정":[1,13],
    "김도원":[6,1],
    "이예지":[5,8],
    "정현구":[8,24],
    "정수민":[7,19],
    "고은지":[11,11],
    "박상우":[6,5],
    "조혜연":[5,10],
    "이남기":[10,15],
    "강예나":[4,21],
    "최서린":[8,15],
    "최민기":[10,11],
    "김우빈":[6,19]
};

function getDday(name){
    if(!BIRTHDAYS[name]) return "생일을 알려주세요";
    const [month,day] = BIRTHDAYS[name];
    const today = new Date();
    today.setHours(0,0,0,0);
    let bday = new Date(today.getFullYear(), month-1, day);
    if(bday <= today){
        bday = new Date(today.getFullYear()+1, month-1, day);
    }
    const diff = Math.round((bday-today)/(1000*60*60*24));
    return diff===0 ? "🎂 생일" : "D-"+diff+"일";
}

const MEMBERS = [
"강예나",
"고은지",
"권회민",
"김도원",
"김우빈",
"나현빈",
"박상우",
"위성군",
"이남기",
"이예지",
"이현정",
"정수민",
"정현구",
"조혜연",
"최민기",
"최서린",
"황민중"
];

function getSeed(){

    const d = new Date();

    return Number(
        d.getFullYear().toString() +
        String(d.getMonth()+1).padStart(2,"0") +
        String(d.getDate()).padStart(2,"0")
    );
}

function shuffle(arr,seed){

    const copy=[...arr];

    let r=seed;

    for(let i=copy.length-1;i>0;i--){

        r=(r*9301+49297)%233280;

        const j=Math.floor(
            (r/233280)*(i+1)
        );

        [copy[i],copy[j]]
        =
        [copy[j],copy[i]];
    }

    return copy;
}

const shuffled =
shuffle(MEMBERS,getSeed());

const seats = {
    head : shuffled[0],
    left : shuffled.slice(1,9),
    right : shuffled.slice(9,17)
};

document.getElementById("today").innerText =
new Date().toLocaleDateString();

const svg =
document.getElementById("seatMap");

const SVG_NS =
"http://www.w3.org/2000/svg";

function create(tag){
    return document.createElementNS(
        SVG_NS,
        tag
    );
}

function draw(){

    svg.innerHTML="";

    const table = create("rect");

    table.setAttribute("x",350);
    table.setAttribute("y",150);
    table.setAttribute("width",400);
    table.setAttribute("height",730);
    table.setAttribute("rx",20);
    table.setAttribute("class","table");

    svg.appendChild(table);

    const tableText = create("text");

    tableText.setAttribute("x",550);
    tableText.setAttribute("y",490);
    tableText.setAttribute("text-anchor","middle");
    tableText.setAttribute("font-size","40");

    tableText.textContent="회의 테이블";

    svg.appendChild(tableText);

    createSeat(
        seats.head,
        500,
        50
    );

    seats.left.forEach((name,index)=>{

        createSeat(
            name,
            170,
            150 + index*90
        );

    });

    seats.right.forEach((name,index)=>{

        createSeat(
            name,
            810,
            150 + index*90
        );

    });

    const entrance = create("text");

    entrance.setAttribute("x",550);
    entrance.setAttribute("y",1010);
    entrance.setAttribute("text-anchor","middle");
    entrance.setAttribute("class","entrance");

    entrance.textContent="🚪 출입구";

    svg.appendChild(entrance);
}

function createSeat(name,x,y){

    const rect = create("rect");

    rect.setAttribute("x",x);
    rect.setAttribute("y",y);
    rect.setAttribute("width",120);
    rect.setAttribute("height",72);
    rect.setAttribute("rx",10);
    rect.setAttribute("class","seat");
    rect.setAttribute("id","seat-"+name);

    svg.appendChild(rect);

    const text = create("text");

    text.setAttribute("x",x+60);
    text.setAttribute("y",y+26);
    text.setAttribute("text-anchor","middle");
    text.setAttribute("class","label");

    text.textContent=name;

    svg.appendChild(text);

    const ddayText = create("text");

    ddayText.setAttribute("x",x+60);
    ddayText.setAttribute("y",y+52);
    ddayText.setAttribute("text-anchor","middle");
    ddayText.setAttribute("class","dday");

    ddayText.textContent=getDday(name);

    svg.appendChild(ddayText);
}

draw();

</script>

</body>
</html>
