<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>17분임 오늘의 자리배치</title>
<style>

*{ box-sizing:border-box; margin:0; padding:0; }

:root{
    --bg:#f4f6f8;
    --nav-bg:#fff;
    --nav-shadow:rgba(0,0,0,.1);
    --text:#222;
    --text-sub:#555;
    --text-muted:#666;
    --text-empty:#aaa;
    --h2:#333;
    --seat-fill:#ececec;
    --seat-stroke:#888;
    --table-fill:white;
    --table-stroke:#333;
    --table-text:#000;
    --entrance-fill:#444;
    --label-fill:#000;
    --dday-fill:#888;
    --card-shadow:rgba(0,0,0,.12);
}

body.dark{
    --bg:#1a1a2e;
    --nav-bg:#16213e;
    --nav-shadow:rgba(0,0,0,.4);
    --text:#e0e0e0;
    --text-sub:#aaa;
    --text-muted:#999;
    --text-empty:#555;
    --h2:#ccc;
    --seat-fill:#2a2a4a;
    --seat-stroke:#555;
    --table-fill:#0f3460;
    --table-stroke:#334;
    --table-text:#ccc;
    --entrance-fill:#aaa;
    --label-fill:#e0e0e0;
    --dday-fill:#888;
    --card-shadow:rgba(0,0,0,.4);
}

body{
    background:var(--bg);
    font-family:"Malgun Gothic",sans-serif;
    color:var(--text);
    transition:background .25s,color .25s;
}

/* ── 네비게이션 (상단 수평 바) ── */
nav{
    position:fixed;
    top:0; left:0;
    width:100%;
    height:44px;
    background:var(--nav-bg);
    box-shadow:0 2px 6px var(--nav-shadow);
    display:flex;
    flex-direction:row;
    align-items:center;
    gap:2px;
    padding:0 10px;
    z-index:100;
    transition:background .25s;
}

.nav-btn{
    padding:5px 10px;
    border:none;
    border-radius:6px;
    font-size:12px;
    font-family:inherit;
    cursor:pointer;
    background:transparent;
    color:var(--text-sub);
    transition:background .15s,color .15s;
    white-space:nowrap;
}

.nav-btn.active{
    background:#1976d2;
    color:#fff;
    font-weight:bold;
}

.theme-toggle{
    margin-left:auto;
    padding:5px 10px;
    border:1.5px solid var(--seat-stroke);
    border-radius:6px;
    background:transparent;
    color:var(--text-sub);
    font-size:11px;
    font-family:inherit;
    cursor:pointer;
    white-space:nowrap;
    transition:border-color .2s,color .2s;
}

.theme-toggle:hover{ border-color:#1976d2; color:#1976d2; }

/* ── 페이지 공통 ── */
.page{ display:none; padding-left:0; padding-top:44px; min-height:100vh; }
.page.active{ display:block; }

/* ── 홈 ── */
#page-home{
    text-align:center;
    padding-left:0;
    padding-top:54px;
}

#page-home h1{ margin-bottom:8px; }

.date{ color:var(--text-muted); margin-bottom:10px; }

/* ── 줌 뷰포트 ── */
.zoom-vp{
    width:100%;
    overflow:hidden;
    touch-action:none;
    position:relative;
    cursor:grab;
}
.zoom-vp:active{ cursor:grabbing; }

svg{
    width:100%;
    max-width:1100px;
    height:auto;
    margin-top:20px;
    display:block;
    margin-left:auto;
    margin-right:auto;
    transform-origin:0 0;
    will-change:transform;
}

.seat{ fill:var(--seat-fill); stroke:var(--seat-stroke); stroke-width:2; }
.label{ font-size:14px; font-weight:bold; fill:var(--label-fill); }
.dday{ font-size:11px; fill:var(--dday-fill); }
.table{ fill:var(--table-fill); stroke:var(--table-stroke); stroke-width:5; }
.table-text{ fill:var(--table-text); }
.entrance{ font-size:28px; font-weight:bold; fill:var(--entrance-fill); }

/* ── 단일 이미지 페이지 공통 ── */
.img-page{
    padding:60px 24px 40px;
}

.img-page-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:24px;
}

.img-page-header h2{
    font-size:22px;
    color:var(--h2);
}


.single-image-wrap{
    width:100%;
    overflow:hidden;
    touch-action:none;
    position:relative;
    text-align:center;
    cursor:grab;
}
.single-image-wrap:active{ cursor:grabbing; }

.single-image-wrap img{
    max-width:100%;
    max-height:80vh;
    border-radius:12px;
    box-shadow:0 4px 20px var(--card-shadow);
    display:inline-block;
    transform-origin:0 0;
    will-change:transform;
}

.empty-msg{
    color:var(--text-empty);
    font-size:16px;
    text-align:center;
    margin-top:80px;
}

/* ── 라이트박스 ── */
.lightbox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.88);
    z-index:200;
    align-items:center;
    justify-content:center;
}

.lightbox.open{ display:flex; }

.lightbox img{
    max-width:94vw;
    max-height:94vh;
    border-radius:8px;
}

.lightbox-close{
    position:fixed;
    top:16px; right:20px;
    color:#fff;
    font-size:32px;
    cursor:pointer;
    background:none;
    border:none;
    line-height:1;
}

</style>
</head>
<body>

<!-- 네비게이션 -->
<nav>
    <button class="nav-btn active"  onclick="showPage('home',this)">홈(자리배치)</button>
    <button class="nav-btn"         onclick="showPage('hall',this)">대강당 자리배치도</button>
    <button class="nav-btn"         onclick="showPage('meal',this)">식사순서</button>
    <button class="nav-btn"         onclick="showPage('schedule',this)">과제제출일정</button>
    <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">🌙 다크모드</button>
</nav>

<!-- 홈 -->
<div id="page-home" class="page active">
    <h1>17분임 오늘의 자리배치</h1>
    <div class="date" id="today"></div>
    <div class="zoom-vp" id="svgWrap">
        <svg id="seatMap" viewBox="0 0 1100 1040"></svg>
    </div>
</div>

<!-- 대강당 자리배치도 -->
<div id="page-hall" class="page img-page">
    <div class="img-page-header">
        <h2>대강당 자리배치도</h2>
    </div>
    <div class="single-image-wrap">
        <img src="img/hall.jpg" alt="대강당 자리배치도"
             onerror="this.style.display='none';document.getElementById('empty-hall').style.display='block'">
    </div>
    <p class="empty-msg" id="empty-hall" style="display:none">이미지를 준비 중입니다</p>
</div>

<!-- 식사순서 -->
<div id="page-meal" class="page img-page">
    <div class="img-page-header">
        <h2>식사순서</h2>
    </div>
    <div class="single-image-wrap">
        <img src="img/meal.jpg" alt="식사순서"
             onerror="this.style.display='none';document.getElementById('empty-meal').style.display='block'">
    </div>
    <p class="empty-msg" id="empty-meal" style="display:none">이미지를 준비 중입니다</p>
</div>

<!-- 과제제출일정 -->
<div id="page-schedule" class="page img-page">
    <div class="img-page-header">
        <h2>과제제출일정</h2>
    </div>
    <div class="single-image-wrap">
        <img src="img/schedule.png" alt="과제제출일정"
             onerror="this.style.display='none';document.getElementById('empty-schedule').style.display='block'">
    </div>
    <p class="empty-msg" id="empty-schedule" style="display:none">이미지를 준비 중입니다</p>
</div>

<!-- 라이트박스 -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <img id="lightboxImg" src="" alt="">
</div>

<script>

/* ── 다크모드 ── */
function applyTheme(dark){
    document.body.classList.toggle('dark', dark);
    document.getElementById('themeBtn').textContent = dark ? '☀️ 라이트모드' : '🌙 다크모드';
}

function toggleTheme(){
    const dark = !document.body.classList.contains('dark');
    localStorage.setItem('theme', dark ? 'dark' : 'light');
    applyTheme(dark);
}

applyTheme(localStorage.getItem('theme') === 'dark');

/* ── 페이지 전환 ── */
function showPage(id, btn){
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-'+id).classList.add('active');
    btn.classList.add('active');
}

/* ── 자리배치 ── */
const BIRTHDAYS = {
    "황민중":[3,4],  "위성군":[7,17], "이현정":[1,13],
    "김도원":[6,1],  "이예지":[5,8],  "정현구":[8,24],
    "정수민":[7,19], "고은지":[11,11],"박상우":[6,5],
    "조혜연":[5,10], "이남기":[10,15],"강예나":[4,21],
    "최서린":[8,15], "최민기":[10,11],"김우빈":[6,19]
};

function getDday(name){
    if(!BIRTHDAYS[name]) return "생일을 알려주세요";
    const [month,day] = BIRTHDAYS[name];
    const today = new Date(); today.setHours(0,0,0,0);
    let bday = new Date(today.getFullYear(), month-1, day);
    if(bday <= today) bday = new Date(today.getFullYear()+1, month-1, day);
    const diff = Math.round((bday-today)/(1000*60*60*24));
    return diff===0 ? "🎂 생일" : "D-"+diff+"일";
}

const MEMBERS = [
    "강예나","고은지","권회민","김도원","김우빈",
    "나현빈","박상우","위성군","이남기","이예지",
    "이현정","정수민","정현구","조혜연","최민기",
    "최서린","황민중"
];

function getSeed(){
    const d = new Date();
    return Number(d.getFullYear().toString() +
        String(d.getMonth()+1).padStart(2,"0") +
        String(d.getDate()).padStart(2,"0"));
}

function shuffle(arr,seed){
    const copy=[...arr]; let r=seed;
    for(let i=copy.length-1;i>0;i--){
        r=(r*9301+49297)%233280;
        const j=Math.floor((r/233280)*(i+1));
        [copy[i],copy[j]]=[copy[j],copy[i]];
    }
    return copy;
}

const shuffled = shuffle(MEMBERS, getSeed());
const seats = {
    head:  shuffled[0],
    left:  shuffled.slice(1,9),
    right: shuffled.slice(9,17)
};

document.getElementById("today").innerText = new Date().toLocaleDateString();

const svg    = document.getElementById("seatMap");
const SVG_NS = "http://www.w3.org/2000/svg";
function create(tag){ return document.createElementNS(SVG_NS,tag); }

function createSeat(name,x,y){
    const rect = create("rect");
    rect.setAttribute("x",x); rect.setAttribute("y",y);
    rect.setAttribute("width",120); rect.setAttribute("height",72);
    rect.setAttribute("rx",10); rect.setAttribute("class","seat");
    svg.appendChild(rect);

    const text = create("text");
    text.setAttribute("x",x+60); text.setAttribute("y",y+26);
    text.setAttribute("text-anchor","middle"); text.setAttribute("class","label");
    text.textContent = name;
    svg.appendChild(text);

    const ddayText = create("text");
    ddayText.setAttribute("x",x+60); ddayText.setAttribute("y",y+52);
    ddayText.setAttribute("text-anchor","middle"); ddayText.setAttribute("class","dday");
    ddayText.textContent = getDday(name);
    svg.appendChild(ddayText);
}

function draw(){
    svg.innerHTML="";

    const table = create("rect");
    table.setAttribute("x",350); table.setAttribute("y",150);
    table.setAttribute("width",400); table.setAttribute("height",730);
    table.setAttribute("rx",20); table.setAttribute("class","table");
    svg.appendChild(table);

    const tableText = create("text");
    tableText.setAttribute("x",550); tableText.setAttribute("y",490);
    tableText.setAttribute("text-anchor","middle"); tableText.setAttribute("font-size","40");
    tableText.setAttribute("class","table-text");
    tableText.textContent="회의 테이블";
    svg.appendChild(tableText);

    createSeat(seats.head, 500, 50);
    seats.left.forEach((name,i)  => createSeat(name, 170, 150+i*90));
    seats.right.forEach((name,i) => createSeat(name, 810, 150+i*90));

    const entrance = create("text");
    entrance.setAttribute("x",550); entrance.setAttribute("y",1010);
    entrance.setAttribute("text-anchor","middle"); entrance.setAttribute("class","entrance");
    entrance.textContent="🚪 출입구";
    svg.appendChild(entrance);
}

draw();


/* ── 핀치줌 & 드래그 ── */
function initPinchZoom(vp, content) {
    let scale = 1, tx = 0, ty = 0;
    let t1 = null, t2 = null;

    function apply() {
        content.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
    }

    function clamp() {
        const vr = vp.getBoundingClientRect();
        const cr = content.getBoundingClientRect();
        const cw = content.offsetWidth  || cr.width;
        const ch = content.offsetHeight || cr.height;
        if (scale <= 1) { scale = 1; tx = 0; ty = 0; return; }
        const minTx = vr.width  - cw * scale;
        const minTy = vr.height - ch * scale;
        tx = Math.min(0, Math.max(minTx, tx));
        ty = Math.min(0, Math.max(minTy, ty));
    }

    vp.addEventListener('touchstart', e => {
        if (e.touches.length === 2) {
            e.preventDefault();
            const a = e.touches[0], b = e.touches[1];
            const vr = vp.getBoundingClientRect();
            t2 = {
                dist: Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY),
                midX: (a.clientX + b.clientX) / 2 - vr.left,
                midY: (a.clientY + b.clientY) / 2 - vr.top,
                scale, tx, ty
            };
            t1 = null;
        } else if (e.touches.length === 1) {
            t1 = { x: e.touches[0].clientX, y: e.touches[0].clientY, tx, ty };
            t2 = null;
        }
    }, { passive: false });

    vp.addEventListener('touchmove', e => {
        e.preventDefault();
        if (e.touches.length === 2 && t2) {
            const a = e.touches[0], b = e.touches[1];
            const vr = vp.getBoundingClientRect();
            const newDist = Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
            const newScale = Math.min(6, Math.max(1, t2.scale * (newDist / t2.dist)));
            const newMidX = (a.clientX + b.clientX) / 2 - vr.left;
            const newMidY = (a.clientY + b.clientY) / 2 - vr.top;
            const ratio = newScale / t2.scale;
            tx = newMidX - (t2.midX - t2.tx) * ratio;
            ty = newMidY - (t2.midY - t2.ty) * ratio;
            scale = newScale;
            clamp();
            apply();
        } else if (e.touches.length === 1 && t1 && scale > 1) {
            tx = t1.tx + e.touches[0].clientX - t1.x;
            ty = t1.ty + e.touches[0].clientY - t1.y;
            clamp();
            apply();
        }
    }, { passive: false });

    vp.addEventListener('touchend', e => {
        if (e.touches.length === 0) {
            t1 = null; t2 = null;
            if (scale < 1.05) { scale = 1; tx = 0; ty = 0; apply(); }
        } else if (e.touches.length === 1) {
            t2 = null;
            t1 = { x: e.touches[0].clientX, y: e.touches[0].clientY, tx, ty };
        }
    });
}

/* 초기화 */
initPinchZoom(document.getElementById('svgWrap'), document.getElementById('seatMap'));
document.querySelectorAll('.single-image-wrap').forEach(wrap => {
    const img = wrap.querySelector('img');
    if (img) initPinchZoom(wrap, img);
});

/* ── 라이트박스 ── */
function openLightbox(src){
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightbox').classList.add('open');
}

function closeLightbox(){
    document.getElementById('lightbox').classList.remove('open');
}

</script>
</body>
</html>
